<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .item { margin-bottom: 16px; }
  .meta { display: block; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .s { font-family: var(--font-serif); font-weight: 600; color: var(--text-strong); letter-spacing: -0.02em; line-height: 1.05; margin: 0; }
  .d  { font-size: 52px; }
  .h1 { font-size: 38px; }
  .h2 { font-size: 28px; }
  .h3 { font-size: 22px; }
</style>
</head>
<body>
  <div class="item"><div class="s d">Bon voyage</div><span class="meta">Display · 52–72px · serif 600</span></div>
  <div class="item"><div class="s h1">Your trip, perfectly packed</div><span class="meta">H1 · 38px</span></div>
  <div class="item"><div class="s h2">Every detail, sorted</div><span class="meta">H2 · 28px</span></div>
  <div class="item"><div class="s h3">Flight to Lisbon</div><span class="meta">H3 · 22px</span></div>
</body>
</html>
