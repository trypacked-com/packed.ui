<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing Scale" subtitle="4px base grid. Use tokens, never magic numbers." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 28px; background: var(--orange-200); border-radius: var(--radius-xs); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .px { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="n">1</span><span class="px">4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="px">8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="n">3</span><span class="px">12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="px">16</span></div>
    <div class="col"><div class="bar" style="height:20px"></div><span class="n">5</span><span class="px">20</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="n">6</span><span class="px">24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="n">8</span><span class="px">32</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="n">10</span><span class="px">40</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="n">12</span><span class="px">48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="n">16</span><span class="px">64</span></div>
    <div class="col"><div class="bar" style="height:80px"></div><span class="n">20</span><span class="px">80</span></div>
  </div>
</body>
</html>
