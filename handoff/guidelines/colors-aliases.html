<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Aliases" subtitle="Reference these roles in product code, not raw scale values." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 48px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .n { font-size: 12px; font-weight: 600; color: var(--text-strong); }
  .t { font-size: 10.5px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--brand)"></div><span class="n">brand</span><span class="t">--brand</span></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><span class="n">accent</span><span class="t">--accent</span></div>
    <div class="sw"><div class="chip" style="background:var(--bg-app)"></div><span class="n">bg-app</span><span class="t">--bg-app</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-card)"></div><span class="n">surface-card</span><span class="t">--surface-card</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-inverse)"></div><span class="n">inverse</span><span class="t">--surface-inverse</span></div>
    <div class="sw"><div class="chip" style="background:var(--brand-subtle)"></div><span class="n">brand-subtle</span><span class="t">--brand-subtle</span></div>
    <div class="sw"><div class="chip" style="background:var(--border-default)"></div><span class="n">border</span><span class="t">--border-default</span></div>
    <div class="sw"><div class="chip" style="background:var(--text-strong)"></div><span class="n">text-strong</span><span class="t">--text-strong</span></div>
  </div>
</body>
</html>
