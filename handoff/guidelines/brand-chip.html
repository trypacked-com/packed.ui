<!-- @dsCard group="Brand" viewport="760x240" name="Agency brand chip" subtitle="White-label logo container — transparent or on-white logos both read cleanly. Tokens in tokens/brand.css §3." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-app); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: stretch; }
  .panel { flex: 1; border-radius: var(--radius-lg); padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .on-cream { background: var(--surface-card); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
  .on-photo { background: linear-gradient(135deg,#c9762f,#8a3d12); }
  .chip {
    display: inline-flex; align-items: center; gap: 9px; align-self: flex-start;
    background: var(--chip-bg); border-radius: var(--chip-radius);
    padding: var(--chip-pad-y) var(--chip-pad-x);
    border: var(--chip-border); box-shadow: var(--chip-shadow);
  }
  .on-photo .chip { box-shadow: var(--chip-shadow-on-photo); border: none; }
  .logo { font-family: var(--font-serif); font-weight: 700; font-size: 18px; color: #1c2b4a; letter-spacing: -0.01em; white-space: nowrap; }
  .dot { width: 18px; height: 18px; border-radius: 5px; background: linear-gradient(135deg,#2b6fd0,#1c2b4a); }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .on-cream .lbl { color: var(--text-muted); }
  .on-photo .lbl { color: rgba(255,255,255,0.92); }
  .t { font-family: var(--font-mono); font-size: 11px; }
  .on-cream .t { color: var(--text-subtle); }
  .on-photo .t { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
  <div class="row">
    <div class="panel on-cream">
      <span class="lbl">On cream surface</span>
      <span class="chip"><span class="dot"></span><span class="logo">agency&nbsp;co.</span></span>
      <span class="t">--chip-bg · --chip-shadow · --chip-radius</span>
    </div>
    <div class="panel on-photo">
      <span class="lbl">Over photography</span>
      <span class="chip"><span class="dot"></span><span class="logo">agency&nbsp;co.</span></span>
      <span class="t">--chip-shadow-on-photo</span>
    </div>
  </div>
</body>
</html>
