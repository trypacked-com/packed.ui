<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Sky" subtitle="Calm blue for weather, sky & flight-status moments." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); }
  .n { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .h { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .star { position: absolute; top: 6px; right: 8px; color: #fff; font-size: 13px; }
  .wrap { position: relative; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sky-50)"></div><span class="n">50</span><span class="h">#ECF6FD</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-100)"></div><span class="n">100</span><span class="h">#D2EAFA</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-200)"></div><span class="n">200</span><span class="h">#A6D3F3</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-300)"></div><span class="n">300</span><span class="h">#6FB7E9</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-400)"></div><span class="n">400</span><span class="h">#3F9BDB</span></div>
    <div class="sw"><div class="wrap"><div class="chip" style="background:var(--sky-500)"></div><span class="star">★</span></div><span class="n">500</span><span class="h">#2B8CD9</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-600)"></div><span class="n">600</span><span class="h">#1E72B8</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-700)"></div><span class="n">700</span><span class="h">#195C93</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-800)"></div><span class="n">800</span><span class="h">#184B76</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky-900)"></div><span class="n">900</span><span class="h">#163E60</span></div>
  </div>
</body>
</html>
