<!-- @dsCard group="Brand" viewport="700x200" name="Logo on Backgrounds" subtitle="White mark on orange or dark; orange mark on cream. Keep clear space ≥ mark height." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; }
  .tile { flex: 1; height: 124px; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
  .lockup { display: flex; align-items: center; gap: 9px; }
  .word { font-family: var(--font-serif); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; }
  .cap { font-size: 10px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:var(--orange-500)">
      <div class="lockup"><img src="../assets/packed-mark-white.svg" width="34" height="34" alt=""><span class="word" style="color:#fff">Packed</span></div>
      <span class="cap" style="color:var(--orange-100)">on brand</span>
    </div>
    <div class="tile" style="background:var(--sand-900)">
      <div class="lockup"><img src="../assets/packed-mark-white.svg" width="34" height="34" alt=""><span class="word" style="color:#fff">Packed</span></div>
      <span class="cap" style="color:var(--sand-400)">on dark</span>
    </div>
    <div class="tile" style="background:var(--sand-50); border:1px solid var(--border-subtle)">
      <div class="lockup"><img src="../assets/packed-mark.svg" width="34" height="34" alt=""><span class="word" style="color:var(--text-strong)">Packed</span></div>
      <span class="cap" style="color:var(--text-muted)">on cream</span>
    </div>
  </div>
</body>
</html>
