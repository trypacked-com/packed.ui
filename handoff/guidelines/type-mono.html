<!-- @dsCard group="Type" viewport="700x180" name="Mono & Eyebrow" subtitle="DM Mono for flight codes, times & gates. Uppercase eyebrows for kickers." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .mono-row { display: flex; gap: 22px; align-items: baseline; font-family: var(--font-mono); color: var(--text-strong); }
  .big { font-size: 28px; font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="pk-eyebrow">Itinerary · Day 2</div>
    <div class="mono-row">
      <span class="big">TP1234</span>
      <span class="big">08:45</span>
      <span class="big">GATE&nbsp;B7</span>
      <span class="big">12C</span>
    </div>
    <span class="meta">DM Mono 500 — tabular figures keep times & codes aligned</span>
  </div>
</body>
</html>
