<!-- @dsCard group="Brand" viewport="700x230" name="Voice & Tone" subtitle="Warm, calm, and quietly capable. We do the worrying so they don't have to." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .cell { padding: 14px 16px; border-radius: var(--radius-md); display: flex; flex-direction: column; gap: 4px; }
  .yes { background: var(--green-50); }
  .no { background: var(--red-50); }
  .tag { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; }
  .yes .tag { color: var(--green-700); }
  .no .tag { color: var(--red-700); }
  .ex { font-size: 15px; color: var(--text-body); }
  .yes .ex { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell yes"><span class="tag">We say</span><span class="ex">"Heads up — your gate just moved to B7."</span></div>
    <div class="cell no"><span class="tag">Not</span><span class="ex">"ALERT: Gate reassignment event detected."</span></div>
    <div class="cell yes"><span class="tag">We say</span><span class="ex">"All set. We'll watch the flights from here."</span></div>
    <div class="cell no"><span class="tag">Not</span><span class="ex">"Configuration successfully submitted."</span></div>
  </div>
</body>
</html>
