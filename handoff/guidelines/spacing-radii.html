<!-- @dsCard group="Spacing" viewport="700x180" name="Corner Radii" subtitle="Generous, soft corners. Cards lg/xl, buttons md or pill." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 76px; background: var(--orange-100); border: 2px solid var(--orange-300); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .px { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">xs</span><span class="px">6</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm</span><span class="px">8</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md</span><span class="px">12</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg</span><span class="px">16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl</span><span class="px">20</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl</span><span class="px">28</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span><span class="px">999</span></div>
  </div>
</body>
</html>
