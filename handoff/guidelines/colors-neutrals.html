<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Sand" subtitle="Warm greys with a sand undertone. 50 is the app background." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 9px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); border: 1px solid var(--border-subtle); }
  .n { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .h { font-size: 10.5px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sand-0)"></div><span class="n">0</span><span class="h">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-50)"></div><span class="n">50</span><span class="h">#FBF7F2</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><span class="n">100</span><span class="h">#F5EEE6</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><span class="n">200</span><span class="h">#EAE0D4</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><span class="n">300</span><span class="h">#D9CCBC</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-400)"></div><span class="n">400</span><span class="h">#B8A894</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-500)"></div><span class="n">500</span><span class="h">#938573</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-600)"></div><span class="n">600</span><span class="h">#6F6456</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-700)"></div><span class="n">700</span><span class="h">#524A3F</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-800)"></div><span class="n">800</span><span class="h">#38322B</span></div>
    <div class="sw"><div class="chip" style="background:var(--sand-900)"></div><span class="n">900</span><span class="h">#221F1A</span></div>
  </div>
</body>
</html>
