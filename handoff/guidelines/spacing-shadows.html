<!-- @dsCard group="Spacing" viewport="700x200" name="Shadows" subtitle="Soft, warm-tinted elevation. Brand glow reserved for primary CTAs." -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 22px; background: var(--bg-app); font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .n { font-size: 11px; font-weight: 700; color: var(--text-strong); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-brand); background:var(--orange-500)"></div><span class="n">brand</span></div>
  </div>
</body>
</html>
