<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); font-family: var(--font-sans); }
  .group { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-subtle); width: 100%; margin-bottom: -6px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusPill, Toast } = window.PackedDesignSystem_477618;
  const Plane = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5a2.1 2.1 0 0 0-3-3L13 8 4.8 6.2a.5.5 0 0 0-.5.8l3.9 4.3-2.1 2.1H3.5a.5.5 0 0 0-.4.8l2.6 3 3 2.6a.5.5 0 0 0 .8-.4v-2.6l2.1-2.1 4.3 3.9a.5.5 0 0 0 .8-.5Z"/></svg>;
  const Sun = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>;
  function Demo() {
    return (
      <div className="group">
        <div className="row"><span className="lbl">Flight status</span>
          <StatusPill status="ontime" />
          <StatusPill status="boarding" pulse />
          <StatusPill status="delayed" label="Delayed 40m" />
          <StatusPill status="cancelled" />
          <StatusPill status="landed" />
        </div>
        <div className="row"><span className="lbl">Toasts</span>
          <Toast tone="warning" icon={<Plane/>} title="Gate change" message="TP1234 now departs from gate B7." time="2m ago" onClose={()=>{}} />
          <Toast tone="sky" icon={<Sun/>} title="Lisbon forecast" message="Sunny, 24°C when you land tomorrow." time="1h ago" onClose={()=>{}} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
