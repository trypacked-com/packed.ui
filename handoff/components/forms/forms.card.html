<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.PackedDesignSystem_477618;
  const Pin = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
  function Demo() {
    const [c1, setC1] = React.useState(true);
    const [c2, setC2] = React.useState(false);
    const [s1, setS1] = React.useState(true);
    const [s2, setS2] = React.useState(false);
    return (
      <div className="grid">
        <Input label="Destination" placeholder="Where to?" iconLeft={<Pin/>} />
        <Select label="Cabin class" options={['Economy','Premium economy','Business']} />
        <Input label="Email" defaultValue="not-an-email" error="That doesn't look right" />
        <div className="stack">
          <Checkbox label="Notify on gate change" checked={c1} onChange={setC1} />
          <Checkbox label="Daily weather digest" checked={c2} onChange={setC2} />
          <Switch label="Flight alerts" checked={s1} onChange={setS1} />
          <Switch label="Marketing emails" checked={s2} onChange={setS2} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
