  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Tag, Avatar } = window.PackedDesignSystem_477618;
  const Plus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
  const Bell = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>;
  function Demo() {
    return (
      <div className="group">
        <div className="row"><span className="lbl">Buttons</span>
          <Button variant="primary" iconLeft={<Plus/>}>Add flight</Button>
          <Button variant="secondary">Save draft</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="danger">Remove</Button>
          <Button variant="primary" pill>Pill</Button>
        </div>
        <div className="row"><span className="lbl">Sizes & states</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
          <IconButton aria-label="bell" variant="soft"><Bell/></IconButton>
          <IconButton aria-label="bell" variant="outline"><Bell/></IconButton>
          <IconButton aria-label="bell" variant="solid" round><Bell/></IconButton>
        </div>
        <div className="row"><span className="lbl">Badges & tags</span>
          <Badge tone="success" dot>On time</Badge>
          <Badge tone="warning" dot>Delayed</Badge>
          <Badge tone="brand">New</Badge>
          <Badge tone="sky">Weather</Badge>
          <Badge tone="solid">3</Badge>
          <Tag onRemove={()=>{}}>Beach</Tag>
          <Tag>Family</Tag>
        </div>
        <div className="row"><span className="lbl">Avatars</span>
          <Avatar name="Mara Quinn" size="sm"/>
          <Avatar name="Tom Reyes" size="md"/>
          <Avatar name="Ada Lin" size="lg" ring/>
          <Avatar name="Quba Vale" size="md"/>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
